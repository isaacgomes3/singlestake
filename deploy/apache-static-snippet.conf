# Snippet — ficheiros estáticos do build (CSS, JS, imagens).
# Inserir em CADA VirtualHost (*:80 e *:443), ANTES do ProxyPass / final.
# Ajuste APP_ROOT se a app não estiver em /var/www/stake37.

    # Estáticos servidos pelo Apache (evita 500 no Node após deploy)
    ProxyPass /assets !
    ProxyPass /images !
    ProxyPass /manifest.webmanifest !
    ProxyPass /lobby !
    ProxyPass /profile !
    ProxyPass /damas !

    Alias /assets "/var/www/stake37/.output/public/assets"
    Alias /images "/var/www/stake37/.output/public/images"
    Alias /manifest.webmanifest "/var/www/stake37/.output/public/manifest.webmanifest"
    Alias /lobby "/var/www/stake37/.output/public/lobby"
    Alias /profile "/var/www/stake37/.output/public/profile"
    Alias /damas "/var/www/stake37/.output/public/damas"

    <Directory "/var/www/stake37/.output/public">
        Require all granted
        Options -Indexes +FollowSymLinks
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

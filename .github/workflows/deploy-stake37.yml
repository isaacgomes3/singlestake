# Deploy automático na VPS quando há push em main.
#
# Secrets obrigatórios: VPS_HOST, VPS_USER
# Chave SSH — use UM dos dois (recomendado: VPS_SSH_KEY_B64):
#   VPS_SSH_KEY_B64 — na VPS: base64 -w0 /root/.ssh/github-deploy-stake37
#   VPS_SSH_KEY     — chave privada multilinha (BEGIN…END)
#
# Na VPS (uma vez):
#   ssh-keygen -t ed25519 -f /root/.ssh/github-deploy-stake37 -N ""
#   cat /root/.ssh/github-deploy-stake37.pub >> /root/.ssh/authorized_keys
#   chmod 600 /root/.ssh/authorized_keys

name: Deploy stake37

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy na VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ]; then
            echo "::error::Defina VPS_HOST e VPS_USER nos secrets do repositório."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          if [ -n "${SSH_KEY_B64:-}" ]; then
            echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/vps_deploy_key
          elif [ -n "${SSH_KEY:-}" ]; then
            printf '%s' "$SSH_KEY" > ~/.ssh/vps_deploy_key
            printf '\n' >> ~/.ssh/vps_deploy_key
          else
            echo "::error::Defina VPS_SSH_KEY_B64 (recomendado) ou VPS_SSH_KEY."
            exit 1
          fi
          chmod 600 ~/.ssh/vps_deploy_key
          if ! ssh-keygen -y -f ~/.ssh/vps_deploy_key >/dev/null 2>&1; then
            echo "::error::Chave SSH inválida. Na VPS: base64 -w0 /root/.ssh/github-deploy-stake37"
            exit 1
          fi
          echo "Chave SSH válida. A ligar a ${VPS_USER}@${VPS_HOST}..."
          ssh -o StrictHostKeyChecking=accept-new \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=120 \
              -i ~/.ssh/vps_deploy_key \
              "${VPS_USER}@${VPS_HOST}" \
              'set -euo pipefail
               echo "=== Ligado como $(whoami) em $(hostname) ==="
               APP_DIR=/var/www/stake37
               if [ ! -d "$APP_DIR" ]; then APP_DIR=/var/www/singlestake; fi
               cd "$APP_DIR"
               # shellcheck source=deploy-common.sh
               source deploy/deploy-common.sh
               ensure_pm2
               echo "=== Node: $(node -v) | PM2: $(pm2 -v) ==="
               set +e
               bash deploy/deploy.sh
               DEPLOY_RC=$?
               if [ "$DEPLOY_RC" -ne 0 ]; then
                 echo "=== deploy.sh falhou ($DEPLOY_RC) — quick-fix ==="
                 bash deploy/quick-fix-site.sh
                 DEPLOY_RC=$?
               fi
               if [ "$DEPLOY_RC" -ne 0 ]; then
                 echo "=== quick-fix falhou — restart-site ==="
                 bash deploy/restart-site.sh
                 DEPLOY_RC=$?
               fi
               set -e
               bash deploy/verify-site.sh
               VERIFY_RC=$?
               if [ "$VERIFY_RC" -eq 0 ]; then
                 exit 0
               fi
               if curl -sf --max-time 20 http://127.0.0.1:3000/entrar | grep -qi "<html"; then
                 echo "=== Node OK (Apache pode precisar reload) ==="
                 bash deploy/patch-apache-static.sh || true
                 exit 0
               fi
               pm2 logs singlestake --lines 30 --nostream 2>/dev/null || true
               exit 1'

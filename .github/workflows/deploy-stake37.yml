# Deploy automático na VPS quando há push em main.
#
# Configurar em GitHub → Settings → Secrets and variables → Actions:
#   VPS_HOST      — ex. 69.62.103.9 ou stake37.com.br
#   VPS_USER      — ex. root
#   VPS_SSH_KEY   — chave privada SSH (conteúdo de id_rsa)
#   VPS_APP_DIR   — opcional, default /var/www/stake37
#
# Na VPS, uma vez: ssh-keygen e adicionar a chave pública em authorized_keys.

name: Deploy stake37

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-/var/www/stake37}"
            cd "$APP_DIR"
            bash deploy/deploy.sh

# Deploy automático na VPS quando há push em main.
#
# Secrets obrigatórios: VPS_HOST, VPS_USER
# Chave SSH — use UM dos dois (recomendado: VPS_SSH_KEY_B64):
#   VPS_SSH_KEY_B64 — na VPS: base64 -w0 /root/.ssh/github-deploy-stake37
#   VPS_SSH_KEY     — chave privada multilinha (BEGIN…END)
#
# Na VPS (uma vez):
#   ssh-keygen -t ed25519 -f /root/.ssh/github-deploy-stake37 -N ""
#   cat /root/.ssh/github-deploy-stake37.pub >> /root/.ssh/authorized_keys
#   chmod 600 /root/.ssh/authorized_keys

name: Deploy stake37

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Instalar dependências
        run: |
          node -v
          npm -v
          npm ci || npm install
      - name: Build de produção
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Deploy na VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash deploy/ci-ssh-deploy.sh

      - name: Guardar log do deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-deploy-log-${{ github.run_number }}
          path: vps-deploy.log
          retention-days: 14
          if-no-files-found: ignore

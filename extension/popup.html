<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <title>STAKE37</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 10px 12px 12px;
        width: 300px;
        font: 11px/1.35 system-ui, -apple-system, sans-serif;
        background: #28282b;
        color: #f4f4f5;
      }
      .top {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        min-height: 44px;
      }
      .power {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
      .power.on {
        background: #22c55e;
        border-color: #4ade80;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.45);
      }
      .power.off {
        background: #ef4444;
        border-color: #f87171;
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.35);
      }
      .power:focus-visible {
        outline: 2px solid #22d3ee;
        outline-offset: 2px;
      }
      .logo-wrap {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 0;
      }
      .logo {
        display: block;
        max-width: 100%;
        max-height: 40px;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      .section {
        margin-bottom: 10px;
      }
      .section-title {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #22d3ee;
        margin-bottom: 6px;
      }
      .modes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .btn {
        border: 1px solid #3f3f46;
        background: #1f1f23;
        color: #d4d4d8;
        border-radius: 8px;
        padding: 8px 6px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        transition: border-color 0.12s, background 0.12s, color 0.12s;
      }
      .btn:hover {
        border-color: #52525b;
        background: #27272a;
      }
      .btn.active-demo {
        border-color: #22d3ee;
        background: rgba(34, 211, 238, 0.12);
        color: #67e8f9;
      }
      .btn.active-real {
        border-color: #22c55e;
        background: rgba(34, 197, 94, 0.22);
        color: #86efac;
        box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.35);
      }
      .btn.active-demo {
        box-shadow: inset 0 0 0 1px rgba(34, 211, 238, 0.35);
      }
      .mode-badge {
        margin-top: 6px;
        text-align: center;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid transparent;
      }
      .mode-badge.demo {
        color: #67e8f9;
        background: rgba(34, 211, 238, 0.12);
        border-color: rgba(34, 211, 238, 0.45);
      }
      .mode-badge.real {
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.45);
      }
      .bet-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }
      .bet-grid .btn {
        padding: 7px 4px;
        font-size: 10px;
        font-weight: 600;
      }
      .row-actions {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .btn-danger {
        flex: 1;
        border-color: #7f1d1d;
        background: rgba(127, 29, 29, 0.35);
        color: #fca5a5;
      }
      .btn-danger:hover {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.2);
      }
      .backup-input {
        width: 100%;
        font-size: 10px;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px dashed #3f3f46;
        background: #1f1f23;
        color: #a1a1aa;
        cursor: pointer;
      }
      .backup-input::file-selector-button {
        border: none;
        border-radius: 6px;
        background: #27272a;
        color: #e4e4e7;
        font-size: 10px;
        font-weight: 600;
        padding: 4px 8px;
        margin-right: 8px;
        cursor: pointer;
      }
      .toast {
        margin: 8px 0 0;
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 10px;
        line-height: 1.4;
        border: 1px solid #3f3f46;
        background: #1f1f23;
        color: #a1a1aa;
      }
      .toast.ok {
        border-color: rgba(34, 211, 238, 0.35);
        color: #a5f3fc;
      }
      .toast.err {
        border-color: rgba(239, 68, 68, 0.35);
        color: #fca5a5;
      }
      .toast:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <button type="button" id="powerToggle" class="power on" aria-label="Ligar ou desligar extensão"></button>
      <div class="logo-wrap">
        <img src="images/stake37-logo.png" alt="STAKE37" class="logo" width="200" height="40" />
      </div>
    </header>

    <section class="section">
      <div class="section-title">Modo execução</div>
      <div class="modes">
        <button type="button" class="btn" id="modeDemo" data-mode="demo">Demo</button>
        <button type="button" class="btn" id="modeReal" data-mode="real">Real</button>
      </div>
      <div id="modeBadge" class="mode-badge demo">Demo</div>
    </section>

    <section class="section">
      <div class="section-title">Calibrar tapete</div>
      <div class="bet-grid">
        <button type="button" class="btn cal" data-cal="even" data-cal-label="Par">Par</button>
        <button type="button" class="btn cal" data-cal="odd" data-cal-label="Ímpar">Ímpar</button>
        <button type="button" class="btn cal" data-cal="high" data-cal-label="Alto">Alto</button>
        <button type="button" class="btn cal" data-cal="low" data-cal-label="Baixo">Baixo</button>
        <button type="button" class="btn cal" data-cal="black" data-cal-label="Preto">Preto</button>
        <button type="button" class="btn cal" data-cal="red" data-cal-label="Vermelho">Vermelho</button>
      </div>
      <div class="row-actions">
        <button type="button" class="btn btn-danger" id="calClear">Apagar</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Testar na mesa</div>
      <div class="bet-grid">
        <button type="button" class="btn" data-bet="even" data-label="Par">Par</button>
        <button type="button" class="btn" data-bet="odd" data-label="Ímpar">Ímpar</button>
        <button type="button" class="btn" data-bet="high" data-label="Alto">Alto</button>
        <button type="button" class="btn" data-bet="low" data-label="Baixo">Baixo</button>
        <button type="button" class="btn" data-bet="black" data-label="Preto">Preto</button>
        <button type="button" class="btn" data-bet="red" data-label="Vermelho">Vermelho</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Backup</div>
      <input type="file" id="primeFile" class="backup-input" accept=".prime" />
    </section>

    <p id="toast" class="toast" role="status"></p>

    <script src="popup.js"></script>
  </body>
</html>
